<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MemeScreen Loading</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      border: 6px solid #ffff00;
      box-sizing: border-box;
    }
    .glitch-text {
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: uppercase;
      color: #ffff00;
      text-shadow: 4px 4px 0px #ff0055, -2px -2px 0px #00e5ff;
      letter-spacing: -2px;
      margin-bottom: 20px;
      animation: glitch 2s infinite;
    }
    @keyframes glitch {
      0% { transform: translate(0) }
      20% { transform: translate(-2px, 2px) }
      40% { transform: translate(-2px, -2px) }
      60% { transform: translate(2px, 2px) }
      80% { transform: translate(2px, -2px) }
      100% { transform: translate(0) }
    }
    .progress-container {
      width: 80%;
      height: 15px;
      border: 3px solid #fff;
      background: #000;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      background: #00ff00;
      width: 0%;
      animation: fillBar 1.5s cubic-bezier(0.8, 0, 0.2, 1) forwards;
    }
    @keyframes fillBar {
      0% { width: 0%; }
      30% { width: 45%; }
      70% { width: 70%; }
      100% { width: 95%; } /* Reste bloqué à 95% jusqu'à ouverture main */
    }
    .sub {
      color: #00ff00;
      font-weight: 800;
      margin-top: 15px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="glitch-text">MEMESCREEN_OS</div>
  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>
  <div class="sub">BOOTING SYSTEM...</div>
</body>
</html>
