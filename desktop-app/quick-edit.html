<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MemeScreen - Envoi Rapide</title>
  <link rel="stylesheet" href="style.css">
  <style>
    
    body {
      background-color: #000;
      color: var(--primary);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
      overflow: hidden;
      border: 3px solid var(--primary);
      text-shadow: var(--shadow-neon);
      text-transform: uppercase;
      font-family: 'Courier New', Courier, monospace;
    }
    
    .editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 0;
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
    }
    
    #memeCanvas, #memeVideo {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    .controls {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .row {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    
    .row input[type="text"] {
      flex: 1;
      padding: 12px;
      border-radius: 0;
      border: 2px solid var(--primary);
      background: #000;
      color: var(--primary);
      font-size: 16px;
      font-family: inherit;
    }
    
    .buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    
    button {
      padding: 10px 20px;
      border-radius: 0;
      font-weight: bold;
      cursor: pointer;
      background: #000;
      color: var(--text-muted);
      border: 2px solid var(--text-muted);
      transition: 0.2s;
      font-family: inherit;
      text-transform: uppercase;
    }
    
    .btn-send {
      color: var(--primary);
      border-color: var(--primary);
    }
    
    .btn-send:hover {
      box-shadow: var(--shadow-neon);
      transform: scale(1.05);
    }
    
    .btn-cancel:hover {
      color: var(--danger);
      border-color: var(--danger);
      box-shadow: 0 0 10px var(--danger);
    }
    
    #uploadStatus {
      text-align: center;
      font-size: 14px;
      margin-top: 5px;
      color: var(--primary);
    }

  
    .close-btn {
      -webkit-app-region: no-drag;
      background: none !important;
      border: none !important;
      color: var(--danger) !important;
      font-size: 1.5rem;
      cursor: pointer;
      font-weight: bold;
      padding: 0;
      box-shadow: none !important;
    }
    .close-btn:hover {
      text-shadow: 0 0 10px var(--danger);
      transform: scale(1.1);
      background: none !important;
    }
    .back-btn {
      background: none !important;
      border: none !important;
      color: var(--text-muted) !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    .back-btn:hover {
      color: var(--primary) !important;
      transform: translateX(-5px);
      background: none !important;
    }
  
    .memeText {
      color: #ffffff !important;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.2) !important;
    }
    .memeText::placeholder {
      color: rgba(255, 255, 255, 0.5) !important;
    }
  </style>
</head>
<body>
  
  
  <div class="drag-header" style="display:flex; justify-content:space-between; align-items:center; -webkit-app-region: drag; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
    
    <h2 style="margin:0; font-size: 1.2rem;">⚡ ÉDITEUR RAPIDE</h2>
    <button class="close-btn" id="headerCloseBtn" style="-webkit-app-region: no-drag; background:none; border:none; color:var(--danger); font-size:1.5rem; cursor:pointer; font-weight:bold;">X</button>
  </div>
  <div style="padding-left: 20px;"><button class="back-btn" id="headerBackBtn" style="-webkit-app-region: no-drag; display:block; margin-bottom:0px; font-size:1rem; cursor:pointer; font-weight:bold; text-align:left;">⬅ RETOUR</button></div>
  <div class="editor-container">

    <video id="memeVideo" style="display:none;" loop muted></video>
    <canvas id="memeCanvas" style="display:none;"></canvas>
  </div>
  
  <div class="controls">
      <div id="textsContainer" style="display:flex; flex-direction:column; gap:10px; overflow-y:auto; max-height: 120px; padding-right:5px;">
        <div class="row text-row">
          <input type="text" class="memeText" placeholder="Texte du meme (vide pour ne rien écrire)">
        </div>
      </div>
      <button id="addTextBtn" style="width:100%; border-color:#ffffff; color:#ffffff; font-weight:bold; background:rgba(255,255,255,0.1); font-size:0.8rem; padding:5px;">+ AJOUTER UN TEXTE</button>
      <div class="row" style="margin-top:10px; display:flex; align-items:center;">
        <label style="color:#ffffff; font-size:0.9rem; margin-right: 10px; font-weight:bold; font-family:inherit; text-transform:uppercase;">Taille Globale :</label>
        <input type="range" id="sizeSlider" min="20" max="150" value="80" style="flex:1;">
      </div>
    
    <div class="buttons">
      <button class="btn-cancel" id="cancelBtn">Annuler</button>
      <button class="btn-send" id="sendBtn">Envoyer 🚀</button>
    </div>
  </div>
  
  <div id="uploadStatus"></div>

  <script src="quick-edit.js"></script>
</body>
</html>
